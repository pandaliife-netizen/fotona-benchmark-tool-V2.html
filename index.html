<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fotona Benchmark Tool</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
 background: #111;
 color: #fff;
 font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
 min-height: 100vh;
 position: relative;
 overflow-x: hidden;
}

body::before {
 content: '';
 position: fixed;
 top: 0; right: 0;
 width: 500px; height: 350px;
 background: radial-gradient(ellipse at top right, rgba(180,0,0,0.3) 0%, transparent 70%);
 pointer-events: none;
 z-index: 0;
}

.app {
 position: relative;
 z-index: 1;
 max-width: 1200px;
 margin: 0 auto;
 padding: 24px 20px 100px;
 display: grid;
 grid-template-columns: 1fr 300px;
 gap: 16px;
 align-items: start;
}

.main-col { display: flex; flex-direction: column; gap: 16px; }

/* INTRO SCREEN */
.intro-screen {
 grid-column: 1 / -1;
 min-height: 80vh;
 display: flex;
 align-items: center;
 justify-content: center;
}
.intro-card {
 background: #1e1e1e;
 border-radius: 20px;
 padding: 56px 60px;
 max-width: 680px;
 width: 100%;
 border: 1px solid #2a2a2a;
}
.intro-eyebrow {
 font-size: 11px;
 font-weight: 700;
 letter-spacing: 0.12em;
 color: #CC0000;
 text-transform: uppercase;
 margin-bottom: 18px;
}
.intro-headline {
 font-size: clamp(28px, 4vw, 42px);
 font-weight: 700;
 line-height: 1.1;
 letter-spacing: -0.02em;
 margin-bottom: 16px;
 color: #fff;
}
.intro-subtext {
 font-size: 16px;
 color: #aaa;
 line-height: 1.6;
 margin-bottom: 10px;
}
.intro-support {
 font-size: 13px;
 color: #666;
 line-height: 1.5;
 margin-bottom: 36px;
 padding-left: 12px;
 border-left: 2px solid #333;
}
.intro-cta {
 display: inline-flex;
 align-items: center;
 gap: 10px;
 background: #CC0000;
 color: #fff;
 border: none;
 border-radius: 999px;
 padding: 15px 32px;
 font-size: 15px;
 font-weight: 600;
 cursor: pointer;
 font-family: inherit;
 transition: background 0.15s, transform 0.1s;
}
.intro-cta:hover { background: #aa0000; transform: translateY(-1px); }

/* HEADER CARD */
.header-card {
 background: #1e1e1e;
 border-radius: 18px;
 padding: 26px 30px 22px;
 border: 1px solid #2a2a2a;
}
.badge-row {
 display: flex;
 align-items: center;
 gap: 10px;
 margin-bottom: 16px;
 flex-wrap: wrap;
}
.tool-badge {
 background: #fff;
 color: #111;
 font-size: 11px;
 font-weight: 700;
 letter-spacing: 0.08em;
 padding: 5px 12px;
 border-radius: 999px;
 white-space: nowrap;
}
.step-label {
 color: #666;
 font-size: 14px;
}
.path-badge {
 font-size: 10px;
 font-weight: 700;
 letter-spacing: 0.08em;
 padding: 4px 10px;
 border-radius: 999px;
 text-transform: uppercase;
 white-space: nowrap;
}
.path-badge.fotona { background: rgba(204,0,0,0.15); color: #ff6666; border: 1px solid rgba(204,0,0,0.3); }
.path-badge.competition { background: rgba(100,140,200,0.15); color: #7aabdf; border: 1px solid rgba(100,140,200,0.3); }

.header-title {
 font-size: clamp(22px, 3.5vw, 34px);
 font-weight: 700;
 line-height: 1.15;
 margin-bottom: 8px;
 letter-spacing: -0.02em;
}
.header-subtitle {
 color: #999;
 font-size: 14px;
 line-height: 1.5;
 margin-bottom: 4px;
}
.header-tip {
 color: #555;
 font-size: 12px;
 font-style: italic;
 display: flex;
 align-items: flex-start;
 gap: 5px;
 margin-top: 4px;
}
.header-tip::before { content: '💡'; font-style: normal; font-size: 11px; }

/* PROGRESS BAR */
.progress-bar {
 display: flex;
 align-items: center;
 margin-top: 20px;
}
.progress-step {
 display: flex;
 flex-direction: column;
 align-items: center;
 position: relative;
 flex: 1;
}
.progress-step:first-child { flex: 0 0 auto; align-items: flex-start; }
.progress-step:last-child { flex: 0 0 auto; align-items: flex-end; }
.progress-connector {
 flex: 1;
 height: 1px;
 background: #333;
 margin-top: -15px;
 z-index: 0;
 transition: background 0.3s;
}
.progress-connector.active { background: #CC0000; }
.step-circle {
 width: 30px; height: 30px;
 border-radius: 50%;
 background: #252525;
 border: 1px solid #444;
 display: flex; align-items: center; justify-content: center;
 font-size: 12px;
 font-weight: 600;
 color: #555;
 position: relative;
 z-index: 1;
 flex-shrink: 0;
 transition: all 0.2s;
}
.step-circle.active {
 width: 34px; height: 34px;
 background: #fff;
 color: #111;
 border-color: #fff;
 font-size: 13px;
 font-weight: 700;
 box-shadow: 0 0 0 3px rgba(255,255,255,0.15);
}
.step-circle.done {
 background: #CC0000;
 color: #fff;
 border-color: #CC0000;
}
.step-name {
 font-size: 10px;
 color: #444;
 margin-top: 6px;
 white-space: nowrap;
 font-weight: 500;
 letter-spacing: 0.02em;
}
.step-name.active { color: #fff; font-weight: 700; font-size: 11px; }
.step-name.done { color: #888; }

/* CONTENT CARD */
.content-card {
 background: #1e1e1e;
 border-radius: 18px;
 padding: 28px 30px;
 border: 1px solid #2a2a2a;
}
.content-card h2 {
 font-size: clamp(18px, 2.5vw, 24px);
 font-weight: 700;
 margin-bottom: 6px;
 letter-spacing: -0.01em;
}
.card-sub { color: #999; font-size: 14px; margin-bottom: 4px; }
.card-tip {
 color: #555;
 font-size: 12px;
 font-style: italic;
 margin-bottom: 20px;
 display: flex;
 gap: 5px;
 align-items: flex-start;
}
.card-tip::before { content: '💡'; font-style: normal; font-size: 11px; margin-top: 1px; }

/* SELECTION GRID */
.selection-grid { display: grid; gap: 12px; }
.selection-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.selection-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
.selection-grid.cols-auto { grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); }

.sel-card {
 background: #222;
 border: 1.5px solid #333;
 border-radius: 14px;
 padding: 18px 20px;
 cursor: pointer;
 transition: border-color 0.15s, background 0.15s, transform 0.1s;
 text-align: left;
 position: relative;
}
.sel-card:hover { border-color: #555; background: #272727; transform: translateY(-1px); }
.sel-card.selected {
 border-color: #CC0000;
 background: rgba(204,0,0,0.1);
}
.sel-card.selected::after {
 content: '✓';
 position: absolute;
 top: 10px; right: 12px;
 width: 20px; height: 20px;
 background: #CC0000;
 color: #fff;
 border-radius: 50%;
 font-size: 11px;
 font-weight: 700;
 display: flex;
 align-items: center;
 justify-content: center;
 line-height: 20px;
 text-align: center;
}
.sel-card .card-badge {
 display: inline-block;
 font-size: 10px;
 font-weight: 700;
 letter-spacing: 0.06em;
 padding: 3px 8px;
 border-radius: 4px;
 margin-bottom: 8px;
 text-transform: uppercase;
}
.badge-foundation { background: rgba(100,160,100,0.2); color: #7dba7d; border: 1px solid rgba(100,160,100,0.3); }
.badge-advanced { background: rgba(100,140,200,0.2); color: #7aabdf; border: 1px solid rgba(100,140,200,0.3); }
.badge-elite { background: rgba(200,169,110,0.2); color: #c8a96e; border: 1px solid rgba(200,169,110,0.3); }
.badge-entry-mid { background: rgba(150,120,180,0.2); color: #b89fd4; border: 1px solid rgba(150,120,180,0.3); }

.sel-card .card-title { font-weight: 700; font-size: 16px; margin-bottom: 4px; color: #fff; }
.sel-card .card-desc { font-size: 13px; color: #777; line-height: 1.45; }
.sel-card .card-meta { font-size: 11px; color: #555; margin-top: 5px; font-style: italic; }
.sel-card .card-use { font-size: 12px; color: #666; margin-top: 6px; line-height: 1.4; border-top: 1px solid #2e2e2e; padding-top: 8px; }

.section-label {
 font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
 color: #444; text-transform: uppercase; margin-bottom: 8px;
}

/* RESULT FRAMING HEADER */
.result-header {
 background: linear-gradient(135deg, rgba(204,0,0,0.12) 0%, rgba(204,0,0,0.04) 100%);
 border: 1px solid rgba(204,0,0,0.25);
 border-radius: 12px;
 padding: 18px 22px;
 margin-bottom: 20px;
 display: flex;
 align-items: flex-start;
 gap: 14px;
}
.result-header-icon {
 font-size: 24px;
 flex-shrink: 0;
 margin-top: 2px;
}
.result-header-text h3 {
 font-size: 17px;
 font-weight: 700;
 color: #fff;
 margin-bottom: 4px;
}
.result-header-text p {
 font-size: 13px;
 color: #999;
 line-height: 1.5;
}
.result-header-text .result-meta {
 font-size: 12px;
 color: #666;
 margin-top: 6px;
 display: flex;
 gap: 16px;
 flex-wrap: wrap;
}
.result-meta span { display: flex; align-items: center; gap: 4px; }
.result-meta span::before { content: '·'; color: #444; }
.result-meta span:first-child::before { display: none; }

/* TABLE */
.table-wrap {
 overflow-x: auto;
 -webkit-overflow-scrolling: touch;
 border-radius: 10px;
}
table {
 width: 100%;
 border-collapse: collapse;
 font-size: 13px;
 min-width: 500px;
}
thead tr { border-bottom: 1px solid #333; }
th {
 padding: 11px 14px;
 text-align: left;
 font-weight: 600;
 font-size: 11px;
 letter-spacing: 0.05em;
 color: #777;
 white-space: nowrap;
 background: #1e1e1e;
 text-transform: uppercase;
}
th.fotona-th {
 color: #fff;
 background: rgba(204,0,0,0.12);
 border-bottom: 2px solid #CC0000;
}
td {
 padding: 12px 14px;
 vertical-align: top;
 color: #bbb;
 border-bottom: 1px solid #262626;
 line-height: 1.45;
}
tr:last-child td { border-bottom: none; }
td.attr-label {
 font-weight: 700;
 color: #888;
 font-size: 10px;
 letter-spacing: 0.07em;
 text-transform: uppercase;
 white-space: nowrap;
 min-width: 130px;
}
td.fotona-td {
 color: #fff;
 font-weight: 500;
 background: rgba(204,0,0,0.06);
 border-left: 2px solid rgba(204,0,0,0.4);
}
tr:hover td { background: rgba(255,255,255,0.02); }
tr:hover td.fotona-td { background: rgba(204,0,0,0.1); }

/* BATTLECARD */
.battlecard {
 display: flex;
 flex-direction: column;
 gap: 1px;
 background: #2a2a2a;
 border-radius: 12px;
 overflow: hidden;
 border: 1px solid #333;
}
.battlecard-row {
 display: grid;
 grid-template-columns: 200px 1fr;
 background: #1e1e1e;
 transition: background 0.1s;
}
.battlecard-row:hover { background: #222; }
.battlecard-label {
 padding: 14px 18px;
 font-size: 10px;
 font-weight: 700;
 letter-spacing: 0.08em;
 text-transform: uppercase;
 color: #666;
 border-right: 1px solid #2a2a2a;
 display: flex;
 align-items: flex-start;
 padding-top: 16px;
}
.battlecard-value {
 padding: 14px 18px;
 font-size: 13px;
 color: #ccc;
 line-height: 1.55;
}
.battlecard-row.highlight .battlecard-label { color: #CC0000; }
.battlecard-row.highlight .battlecard-value { color: #fff; font-weight: 500; font-size: 13px; }
.battlecard-row.strengths .battlecard-label { color: #7dba7d; }
.battlecard-row.strengths .battlecard-value { color: #fff; font-weight: 500; font-size: 13px; }
.battlecard-row.fotona-rec .battlecard-label { color: #7aabdf; }
.battlecard-row.fotona-rec .battlecard-value { color: #fff; font-weight: 600; font-size: 14px; }

/* SPEC CARD */
.spec-grid {
 display: grid;
 grid-template-columns: 1fr 1fr;
 gap: 12px;
}
.spec-item {
 background: #222;
 border-radius: 10px;
 padding: 14px 16px;
 border: 1px solid #2e2e2e;
}
.spec-item.full-width { grid-column: 1 / -1; }
.spec-label {
 font-size: 10px;
 font-weight: 700;
 letter-spacing: 0.08em;
 color: #555;
 text-transform: uppercase;
 margin-bottom: 6px;
}
.spec-value { font-size: 14px; color: #ddd; line-height: 1.5; }
.best-fit-box {
 background: rgba(204,0,0,0.07);
 border: 1px solid rgba(204,0,0,0.25);
 border-radius: 10px;
 padding: 14px 16px;
 grid-column: 1 / -1;
}
.best-fit-box .spec-label { color: #CC0000; }
.best-fit-box .spec-value { color: #fff; font-size: 14px; font-weight: 500; }

/* BULLETS */
.cell-bullets { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 4px; }
.cell-bullets li { display: flex; align-items: flex-start; gap: 6px; line-height: 1.4; }
.cell-bullets li::before { content: '•'; color: #CC0000; font-size: 14px; line-height: 1.35; flex-shrink: 0; }

/* VIEW ICON */
.view-icon { font-size: 22px; margin-bottom: 8px; }

/* SIDEBAR */
.sidebar-col { position: sticky; top: 24px; }
.summary-card {
 background: #1a1a1a;
 border-radius: 18px;
 padding: 22px;
 border: 1px solid #2a2a2a;
 border-left: 3px solid #CC0000;
}
.summary-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 3px; color: #fff; }
.summary-hint { color: #555; font-size: 12px; margin-bottom: 18px; }
.summary-empty { color: #444; font-size: 13px; text-align: center; line-height: 1.6; padding: 16px 0; }
.summary-item { margin-bottom: 12px; }
.summary-item .s-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; color: #555; text-transform: uppercase; margin-bottom: 3px; }
.summary-item .s-value { font-size: 13px; color: #ddd; font-weight: 500; }
.summary-divider { height: 1px; background: #252525; margin: 14px 0; }
.summary-highlight {
 background: rgba(204,0,0,0.07);
 border: 1px solid rgba(204,0,0,0.2);
 border-radius: 8px;
 padding: 10px 12px;
 margin-top: 12px;
}
.summary-highlight .s-label { color: #CC0000; }
.summary-highlight .s-value { color: #fff; font-size: 12px; line-height: 1.5; }

/* BOTTOM NAV */
.bottom-nav {
 position: fixed;
 bottom: 0; left: 0; right: 0;
 padding: 14px 24px;
 display: flex;
 justify-content: space-between;
 z-index: 50;
 pointer-events: none;
 background: linear-gradient(to top, rgba(17,17,17,0.95) 60%, transparent);
}
.bottom-nav button {
 pointer-events: all;
 padding: 12px 24px;
 border-radius: 999px;
 border: 1.5px solid #333;
 background: #1e1e1e;
 color: #888;
 font-size: 14px;
 font-weight: 500;
 cursor: pointer;
 font-family: inherit;
 transition: all 0.15s;
}
.bottom-nav button:hover { border-color: #666; color: #fff; }
.bottom-nav button.disabled { opacity: 0.25; pointer-events: none; }
.bottom-nav .btn-next.ready { background: #1e1e1e; color: #fff; border-color: #555; }

/* FADE */
.fade-in { animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
.hidden { display: none !important; }

/* RESPONSIVE */
@media (max-width: 900px) {
 .app { grid-template-columns: 1fr; padding-bottom: 90px; }
 .sidebar-col { display: none; }
 .intro-screen { min-height: 70vh; }
 .intro-card { padding: 36px 28px; }
 .selection-grid.cols-3 { grid-template-columns: 1fr 1fr; }
 .spec-grid { grid-template-columns: 1fr; }
 .spec-item.full-width, .best-fit-box { grid-column: auto; }
 .battlecard-row { grid-template-columns: 140px 1fr; }
}
@media (max-width: 560px) {
 .header-card, .content-card { padding: 18px; }
 .selection-grid.cols-2, .selection-grid.cols-3 { grid-template-columns: 1fr; }
 .step-name { display: none; }
 table { font-size: 12px; }
 th, td { padding: 9px 10px; }
 .battlecard-row { grid-template-columns: 1fr; }
 .battlecard-label { border-right: none; border-bottom: 1px solid #2a2a2a; padding-bottom: 4px; }
}
</style>
</head>

function sortedBullets(parts, key) {
 const order = BULLET_ORDER[key];
 if (!order || !parts || parts.length <= 1) return parts;
 return [...parts].sort((a,b) => {
 const ai = order.findIndex(o => a.toLowerCase().includes(o));
 const bi = order.findIndex(o => b.toLowerCase().includes(o));
 return (ai===-1?999:ai) - (bi===-1?999:bi);
 });
}

const NO_BULLET_ATTRS = new Set();

function splitOnComma(text) {
 const parts=[]; let current=''; let depth=0;
 for(let i=0;i<text.length;i++){
 const ch=text[i];
 if(ch==='(') depth++;
 else if(ch===')') depth--;
 if(depth===0&&ch===','&&text[i+1]===' '){parts.push(current.trim());current='';i++;}
 else current+=ch;
 }
 if(current.trim()) parts.push(current.trim());
 return parts;
}
function splitOnPlus(text) {
 const parts=[]; let current=''; let depth=0;
 for(let i=0;i<text.length;i++){
 const ch=text[i];
 if(ch==='(') depth++;
 else if(ch===')') depth--;
 if(depth===0&&ch==='+'&&text[i-1]===' '&&text[i+1]===' '){parts.push(current.trim());current='';i++;}
 else current+=ch;
 }
 if(current.trim()) parts.push(current.trim());
 return parts.length>0?parts:[text];
}
function splitValue(text, attr) {
 if(!text||text==='—') return [text||'—'];
 if(attr==='Modality / Wavelength'||attr==='Technology Type'){
 const sp=text.split(/;\s+/);
 if(sp.length>1){const p=[];sp.forEach(s=>p.push(...splitOnPlus(s)));return p.map(x=>x.trim()).filter(Boolean);}
 const pp=splitOnPlus(text);
 if(pp.length>1) return pp.map(x=>x.trim()).filter(Boolean);
 return splitOnComma(text);
 }
 if(attr==='Anesthesia Requirement'){const p=text.split(/;\s+/);if(p.length>1)return p.map(x=>x.trim()).filter(Boolean);}
 if(attr==='Clinical Versatility'){
 const pp=splitOnPlus(text);if(pp.length>1)return pp.map(x=>x.trim()).filter(Boolean);
 const sp=text.split(/;\s+/);if(sp.length>1)return sp.map(x=>x.trim()).filter(Boolean);
 }
 return splitOnComma(text);
}
function toSentenceCase(str) {
 if(!str) return str;
 return str.charAt(0).toUpperCase()+str.slice(1).toLowerCase()
 .replace(/\ber:yag\b/gi,'Er:YAG').replace(/\bnd:yag\b/gi,'Nd:YAG').replace(/\ber,cr:ysgg\b/gi,'Er,Cr:YSGG')
 .replace(/\bqcw\b/gi,'QCW').replace(/\bipl\b/gi,'IPL').replace(/\brf\b/gi,'RF').replace(/co₂/gi,'CO₂')
 .replace(/\bbbl\b/gi,'BBL').replace(/\bhifem\b/gi,'HIFEM').replace(/\bems\b/gi,'EMS').replace(/\bgyn\b/gi,'GYN')
 .replace(/ob\/gyn/gi,'OB/GYN').replace(/\bpbm\b/gi,'PBM').replace(/\btots\b/gi,'TOTS').replace(/\bvsp\b/gi,'VSP')
 .replace(/\bssp\b/gi,'SSP').replace(/frac3®/gi,'FRAC3®').replace(/piano®/gi,'PIANO®').replace(/smooth®/gi,'SMOOTH®')
 .replace(/fractat®/gi,'FracTAT®').replace(/\bmaqx\b/gi,'MaQX').replace(/nightlase®/gi,'NightLase®')
 .replace(/sweeps®/gi,'SWEEPS®').replace(/r-sweeps®/gi,'R-SWEEPS®').replace(/lanap®/gi,'LANAP®')
 .replace(/lapip™/gi,'LAPIP™').replace(/blast™/gi,'BLAST™').replace(/coolpeel®/gi,'CoolPeel®')
 .replace(/xpl™/gi,'XPL™').replace(/blend x®/gi,'BLEND X®').replace(/fotona4d®/gi,'Fotona4D®')
 .replace(/halo®/gi,'HALO®').replace(/n\/a/gi,'N/A').replace(/I–VI/gi,'I–VI').replace(/I–IV/gi,'I–IV')
 .replace(/I–V/gi,'I–V').replace(/I–VII/gi,'I–VII').replace(/(\d+)nm/g,(_,n)=>n+'nm')
 .replace(/(\d+)ps/g,(_,n)=>n+'ps').replace(/(\d+)gw/gi,(_,n)=>n+'GW').replace(/(\d+)μm/gi,(_,n)=>n+'μm')
 .replace(/\bhims\b/gi,'HIMS');
}
function toBullets(text, attr, sortKey) {
 if(!text||text==='—') return text||'—';
 let parts=splitValue(text,attr);
 if(sortKey) parts=sortedBullets(parts,sortKey);
 return `<ul class="cell-bullets">${parts.map(p=>`<li>${toSentenceCase(p)}</li>`).join('')}</ul>`;
}
function specBullets(text) { return toBullets(text,null,null); }

function rawBullets(text) {
 // Like specBullets but preserves original casing — used for device names
 if(!text||text==='—') return text||'—';
 const parts = splitOnComma(text);
 if(parts.length<=1) return text;
 return `<ul class="cell-bullets">${parts.map(p=>`<li>${p.trim()}</li>`).join('')}</ul>`;
}

 else if(state.view==='vs-comp') renderVsComp(resultHeader);
 else if(state.view==='vs-lineup') renderVsLineup(resultHeader);
}

function renderStandalone(headerHtml='') {
 const d=STANDALONE_DATA[state.device];
 if(!d){document.getElementById('contentCard').innerHTML=headerHtml+'<p>No data.</p>';return;}
 const tierClass=d.tier.toLowerCase().replace(/[^a-z]/g,'-');
 const isDental=state.division==='dental';
 const dentalFields=`
 <div class="spec-item"><div class="spec-label">Hard Tissue Capability</div><div class="spec-value">${specBullets(d.hardTissue||'—')}</div></div>
 <div class="spec-item"><div class="spec-label">Anesthesia Requirement</div><div class="spec-value">${specBullets(d.anesthesia||'—')}</div></div>
 <div class="spec-item full-width"><div class="spec-label">Clinical Versatility</div><div class="spec-value">${specBullets(d.versatility||'—')}</div></div>`;
 const aesthFields=`
 <div class="spec-item full-width"><div class="spec-label">Treatment Categories Covered</div><div class="spec-value">${specBullets(d.categories||'—')}</div></div>
 <div class="spec-item"><div class="spec-label">Downtime / Patient Comfort</div><div class="spec-value">${specBullets(d.downtime||'—')}</div></div>
 <div class="spec-item"><div class="spec-label">Skin Type Safety</div><div class="spec-value">${specBullets(d.skinSafety||'—')}</div></div>`;
 document.getElementById('contentCard').innerHTML=`${headerHtml}
 <div class="spec-grid">
 <div class="spec-item"><div class="spec-label">Tier</div><div class="spec-value"><span class="card-badge badge-${tierClass}">${d.tier}</span></div></div>
 <div class="spec-item"><div class="spec-label">Pricing</div><div class="spec-value">${specBullets(d.pricing)}</div></div>
 <div class="spec-item full-width"><div class="spec-label">Modality / Wavelength</div><div class="spec-value">${specBullets(d.modality)}</div></div>
 <div class="spec-item full-width"><div class="spec-label">Key Indications</div><div class="spec-value">${specBullets(d.indications)}</div></div>
 ${isDental?dentalFields:aesthFields}
 <div class="spec-item full-width"><div class="spec-label">Consumable Cost</div><div class="spec-value">${specBullets(d.consumables)}</div></div>
 <div class="best-fit-box"><div class="spec-label">Best Fit Practice</div><div class="spec-value">${specBullets(d.bestFit)}</div></div>
 </div>`;
}

function renderVsComp(headerHtml='') {
 const data=COMP_DATA[state.device];
 if(!data){document.getElementById('contentCard').innerHTML=headerHtml+'<p>No data.</p>';return;}
 const allCols=[state.deviceName,...data.competitors];
 let thead=`<tr><th style="min-width:130px">Attribute</th>`;
 allCols.forEach((c,i)=>thead+=i===0?`<th class="fotona-th">${c}</th>`:`<th>${c}</th>`);
 thead+='</tr>';
 const attrs=data.attrs||DENTAL_ATTRS;
 let tbody='';
 attrs.forEach(attr=>{
 const vals=data.rows[attr]||[];
 const sk=state.division+':'+attr;
 tbody+=`<tr><td class="attr-label">${attr}</td>`;
 allCols.forEach((_,i)=>{
 const c=toBullets(vals[i]||'—',attr,sk);
 tbody+=i===0?`<td class="fotona-td">${c}</td>`:`<td>${c}</td>`;
 });
 tbody+='</tr>';
 });
 document.getElementById('contentCard').innerHTML=`${headerHtml}
 <p class="card-sub" style="margin-bottom:14px">${state.deviceName} vs. Competition — Fotona column highlighted. Scroll horizontally on smaller screens.</p>
 <div class="table-wrap"><table><thead>${thead}</thead><tbody>${tbody}</tbody></table></div>`;
}

function renderVsLineup(headerHtml='') {
 const ld=LINEUP_DATA[state.division];
 if(!ld){document.getElementById('contentCard').innerHTML=headerHtml+'<p>No data.</p>';return;}
 const selIdx=ld.selectedIndex[state.device];
 let thead=`<tr><th style="min-width:130px">Attribute</th>`;
 ld.devices.forEach((name,i)=>thead+=i===selIdx?`<th class="fotona-th">${name}</th>`:`<th>${name}</th>`);
 thead+='</tr>';
 let tbody=`<tr><td class="attr-label">Tier</td>`;
 ld.tiers.forEach((t,i)=>{
 const cell=`<span class="card-badge badge-${t.toLowerCase()}">${t}</span>`;
 tbody+=i===selIdx?`<td class="fotona-td">${cell}</td>`:`<td>${cell}</td>`;
 });
 tbody+='</tr>';
 ld.attrs.forEach(attr=>{
 const vals=ld.rows[attr]||[];
 const sk=state.division+':'+attr;
 tbody+=`<tr><td class="attr-label">${attr}</td>`;
 ld.devices.forEach((_,i)=>{
 const c=toBullets(vals[i]||'—',attr,sk);
 tbody+=i===selIdx?`<td class="fotona-td">${c}</td>`:`<td>${c}</td>`;
 });
 tbody+='</tr>';
 });
 document.getElementById('contentCard').innerHTML=`${headerHtml}
 <p class="card-sub" style="margin-bottom:14px">${state.deviceName} highlighted within the Fotona lineup. Scroll horizontally to see all models.</p>
 <div class="table-wrap"><table><thead>${thead}</thead><tbody>${tbody}</tbody></table></div>`;
}

// ─── COMPETITOR PATH RENDERERS ───────────────
function renderCompetitorBrand() {
 setHeader('Select a competitor brand.','Choose the brand you want to review and position against.','Only brands relevant to the '+( state.division==='dental'?'Dental':'Aesthetics')+' division are shown.');
 const brands=state.division==='dental'?DENTAL_COMPETITORS:AESTH_COMPETITORS;
 let html=`<div class="selection-grid cols-auto" style="margin-top:4px">`;
 brands.forEach(b=>{
 html+=`<div class="sel-card ${state.competitorBrand===b.id?'selected':''}" onclick="selectBrand('${b.id}','${b.name.replace(/'/g,"\\'")}')">
 <div class="card-title">${b.name}</div>
 <div class="card-desc">${b.desc}</div>
 <div class="card-meta">${b.modality}</div>
 </div>`;
 });
 html+='</div>';
 document.getElementById('contentCard').innerHTML=`<h2>Select a competitor brand.</h2><p class="card-sub">Choose the brand most relevant to this conversation.</p><div style="margin-top:16px">${html}</div>`;
}

function renderCompetitorBattlecard() {
 setHeader('Competitor Battlecard','Use this summary to understand where the brand is strong, where it is vulnerable, and which Fotona device to position against it.');
 const bc=COMPETITOR_BATTLECARDS[state.competitorBrand];
 if(!bc){document.getElementById('contentCard').innerHTML='<p>No battlecard data.</p>';return;}
 const resultHeader=`
 <div class="result-header">
 <div class="result-header-icon">🎯</div>
 <div class="result-header-text">
 <h3>Competitor battlecard</h3>
 <p>Use this summary to understand where ${state.competitorBrandName} is strong, where it is vulnerable, and which Fotona device to position against it.</p>
 </div>
 </div>`;
 const rows=[
 {label:'Modality / Wavelength',val:bc.modality,cls:''},
 {label:'Key Indications',val:bc.indications,cls:''},
 {label:'Treatment Categories',val:bc.categories,cls:''},
 {label:'Pricing Tier',val:bc.pricing,cls:''},
 {label:'Target Buyer',val:bc.targetBuyer,cls:''},
 {label:'Key Strengths',val:bc.strengths||'—',cls:'strengths'},
 {label:'Key Weakness vs Fotona',val:bc.weakness,cls:'highlight'},
 {label:'Best Fotona Device to Position Against',val:bc.bestFotona,cls:'fotona-rec',raw:true},
 ];
 let html=`<div class="battlecard">`;
 rows.forEach(r=>{
 html+=`<div class="battlecard-row ${r.cls}">
 <div class="battlecard-label">${r.label}</div>
 <div class="battlecard-value">${r.raw ? rawBullets(r.val) : specBullets(r.val)}</div>
 </div>`;
 });
 html+='</div>';
 document.getElementById('contentCard').innerHTML=resultHeader+html;
}

function renderCompetitorDevices() {
 setHeader('Competitor Device Overview','Review this brand\'s device lineup and specifications in one place.');
 const data=COMPETITOR_DEVICES[state.competitorBrand];
 if(!data){document.getElementById('contentCard').innerHTML='<p>No device data available for this competitor.</p>';return;}
 const resultHeader=`
 <div class="result-header">
 <div class="result-header-icon">📋</div>
 <div class="result-header-text">
 <h3>Competitor device overview</h3>
 <p>Review ${state.competitorBrandName}'s full device lineup and specifications in one place.</p>
 <div class="result-meta"><span>${state.competitorBrandName}</span><span>${state.division==='dental'?'Dental':'Aesthetics'}</span></div>
 </div>
 </div>`;
 let thead=`<tr><th style="min-width:130px">Attribute</th>`;
 data.devices.forEach(name=>thead+=`<th>${name}</th>`);
 thead+='</tr>';
 let tbody='';
 data.attrs.forEach(attr=>{
 const vals=data.rows[attr]||[];
 const sk=state.division+':'+attr;
 tbody+=`<tr><td class="attr-label">${attr}</td>`;
 data.devices.forEach((_,i)=>{
 tbody+=`<td>${toBullets(vals[i]||'—',attr,sk)}</td>`;
 });
 tbody+='</tr>';
 });
 document.getElementById('contentCard').innerHTML=`${resultHeader}
 <p class="card-sub" style="margin-bottom:14px">Scroll horizontally to view all devices.</p>
 <div class="table-wrap"><table><thead>${thead}</thead><tbody>${tbody}</tbody></table></div>`;
}

// ─── SELECTION HELPERS ───────────────────────
function startBenchmark(){ state.step=1; render(); }
function select(field, val) {
 if(field==='division'&&state.division!==val){ state.division=val; state.pathType=null; state.device=null; state.deviceName=null; state.competitorBrand=null; state.competitorBrandName=null; state.view=null; }
 else if(field==='pathType'&&state.pathType!==val){ state.pathType=val; state.device=null; state.deviceName=null; state.competitorBrand=null; state.competitorBrandName=null; state.view=null; }
 else if(field==='view'){ state.view=null; state.view=val; }
 else state[field]=val;
 render();
}
function selectDevice(id, name){ state.device=id; state.deviceName=name; state.view=null; render(); }
function selectBrand(id, name){ state.competitorBrand=id; state.competitorBrandName=name; render(); }

// ─── NAVIGATION ──────────────────────────────
function goNext() {
 if((isFotonaPath()&&state.step===5)||(isCompetitorPath()&&state.step===5)){
 state={step:0,division:null,pathType:null,device:null,deviceName:null,competitorBrand:null,competitorBrandName:null,view:null};
 render(); return;
 }
 const canAdvance=(state.step===1&&state.division)||(state.step===2&&state.pathType)||
 (isFotonaPath()&&state.step===3&&state.device)||(isFotonaPath()&&state.step===4&&state.view)||
 (isCompetitorPath()&&state.step===3&&state.competitorBrand)||(isCompetitorPath()&&state.step===4);
 if(!canAdvance) return;
 state.step++;
 render();
}
function goBack() {
 if(state.step<=1){ state.step=0; render(); return; }
 state.step--;
 if(state.step===4&&isFotonaPath()) state.view=null;
 if(state.step===3&&isFotonaPath()){ state.device=null; state.deviceName=null; state.view=null; }
 if(state.step===4&&isCompetitorPath()) { /* stay on battlecard, no clear needed */ }
 if(state.step===3&&isCompetitorPath()){ state.competitorBrand=null; state.competitorBrandName=null; }
 if(state.step===2){ state.pathType=null; state.device=null; state.deviceName=null; state.competitorBrand=null; state.competitorBrandName=null; state.view=null; }
 render();
}

render();
</script>
</body>
</html>
